    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; font-weight: 700; }
        body { background: #FBF9F7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .login-view { max-width: 440px; width: 100%; background: white; border-radius: 24px; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08); padding: 40px 32px; }
        .login-header { text-align: center; margin-bottom: 36px; }
        .login-header h2 { font-size: 28px; font-weight: 900; color: #1E4D5C; }
        .login-header p { color: #5a6b7a; margin-top: 6px; font-size: 14px; }
        .input-group { margin-bottom: 22px; }
        .input-group label { display: block; font-weight: 700; font-size: 0.9rem; color: #1e293b; margin-bottom: 6px; }
        .input-group input { width: 100%; padding: 14px 18px; border: 2px solid #e0e7ef; border-radius: 16px; font-size: 1rem; background: #fafcff; transition: 0.2s; }
        .input-group input:focus { outline: none; border-color: #C9A84C; box-shadow: 0 0 0 4px rgba(201, 168, 76, 0.1); }
        .login-btn { width: 100%; padding: 14px; background: #1E4D5C; color: white; border: none; border-radius: 16px; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .login-btn:hover { background: #1a3d4a; }
        .error-msg { color: #d32f2f; text-align: center; margin-top: 14px; font-size: 0.9rem; min-height: 20px; }
        .loader-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1E4D5C; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.4s; }
        .loader-hidden { opacity: 0; pointer-events: none; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.15); border-top: 5px solid #C9A84C; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { margin-top: 20px; color: #C9A84C; font-weight: 700; letter-spacing: 2px; font-size: 16px; }
        .hidden { display: none !important; }
    </style>
</head>
